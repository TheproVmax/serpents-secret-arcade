<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Map</title>
<link rel="stylesheet" href="../style.css">

<style>

/* PAGE LAYOUT */
body{
margin:0;
padding:20px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;

min-height:100vh;

background:#cfd8e3;
font-family:inherit;
}

/* TITLE */
h1{
margin:10px 0 20px 0;
font-size:34px;
font-weight:600;
color:#1a1f2b;
text-align:center;
}

/* GRID */
.map{
width:100%;
max-width:600px;

display:grid;
grid-template-columns:repeat(2, 1fr);
gap:14px;

padding:10px;
box-sizing:border-box;
}

/* CARDS */
.card{
background:#f5f7fa;

border:1px solid rgba(0,0,0,0.1);
border-radius:12px;

height:120px;

display:flex;
align-items:center;
justify-content:center;

font-size:16px;
font-weight:500;

cursor:pointer;

transition:0.15s ease;

text-align:center;
color:#1a1f2b;
}

.card:hover{
transform:translateY(-2px);
background:#ffffff;
}

/* MOBILE FIX */
@media (max-width:600px){
.map{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<h1>Choose a Realm</h1>

<div class="map">

<div class="card" onclick="go('battle')">
Serpent Trials
</div>

<div class="card" onclick="go('stacker')">
Ancient Ruins
</div>

<div class="card" onclick="go('platformer')">
Sky Escape
</div>

<div class="card" onclick="go('draw')">
Vision Chamber
</div>

</div>

<script>
function go(game){
window.location.href="../games/" + game + ".html";
}
</script>

</body>
</html>
