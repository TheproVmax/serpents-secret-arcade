<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Map</title>
<link rel="stylesheet" href="../style.css">

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1{
margin-bottom:40px;
}

.map{
display:grid;
grid-template-columns:repeat(2,220px);
gap:30px;
}

.card{
width:220px;
height:180px;

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

background:rgba(30,40,60,0.8);

backdrop-filter:blur(10px);

cursor:pointer;

transition:0.3s;

box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 30px #7fb3ff;
background:rgba(50,80,120,0.9);
}

</style>
</head>

<body>

<h1>Choose Your Realm</h1>

<div class="map">

<div class="card" onclick="go('battle')">⚔ Serpent Trials</div>
<div class="card" onclick="go('stacker')">🏛 Ancient Ruins</div>
<div class="card" onclick="go('platformer')">🌫 Sky Escape</div>
<div class="card" onclick="go('draw')">✨ Vision Chamber</div>

</div>

<script>
function go(g){
window.location.href="../games/"+g+".html";
}
</script>

</body>
</html>
