<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle</title>
<style>

body{
margin:0;
font-family:Arial;
background:#1b1f2a;
color:white;
text-align:center;
}

.screen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.enemy{
width:80px;
height:80px;
background:red;
margin-bottom:20px;
}

.player{
width:80px;
height:80px;
background:blue;
margin-top:20px;
}

button{
margin:10px;
padding:10px 16px;
}

</style>
</head>

<body>

<div class="screen">

<div class="enemy" id="enemy"></div>

<div id="log">Battle Start</div>

<div class="player"></div>

<button onclick="attack()">Attack</button>
<button onclick="heal()">Heal</button>

</div>

<script>

let enemyHP = 50;
let playerHP = 100;

function attack(){
enemyHP -= 10;
log("You hit the enemy");

if(enemyHP <= 0){
log("Enemy defeated");
return;
}

enemyTurn();
}

function heal(){
playerHP += 10;
log("You healed");

enemyTurn();
}

function enemyTurn(){
playerHP -= 8;

if(playerHP <= 0){
log("You lost");
return;
}

log("Enemy attacks");
}

function log(text){
document.getElementById("log").innerText = text;
}

</script>

</body>
</html>
