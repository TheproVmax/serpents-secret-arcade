<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Otherworld Trial</title>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(#0d1320,#05070f);
color:white;
overflow:hidden;
}

/* STAGE */
.screen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
position:relative;
z-index:2;
}

/* HERO + ENEMY */
.row{
display:flex;
gap:80px;
align-items:center;
}

.sprite{
width:110px;
height:110px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

/* HERO = KIRANMALA-STYLE PROTAGONIST */
.player{
background:#3b82f6;
}

/* SERPENT GUARDIANS / OTHERWORLD CREATURES */
.enemy{
background:#7c2d12;
}

/* UI */
.ui{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:10px;
max-width:420px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1f2937;
color:white;
}

button:hover{
background:#374151;
}

/* LOG */
.log{
margin-top:10px;
opacity:0.8;
font-size:14px;
text-align:center;
max-width:400px;
}

/* HIT EFFECT */
.hit{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

/* DAMAGE POPUP */
.damage{
position:absolute;
color:#facc15;
font-weight:bold;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-50px);}
}

</style>
</head>

<body>

<div class="screen">

<div class="row">
<div id="player" class="sprite player">Kiranmala</div>
<div id="enemy" class="sprite enemy">Serpent Guard</div>
</div>

<div>
HP: <span id="php">100</span> |
Guardian HP: <span id="ehp">120</span> |
Mana: <span id="mana">60</span>
</div>

<div class="ui">

<button onclick="attack()">Serpent Strike</button>
<button onclick="fire()">Serpent Flame</button>
<button onclick="lightning()">Star Sigil</button>
<button onclick="heal()">Royal Blessing</button>

</div>

<div class="log" id="log">
A Guardian of the Otherworld blocks your path...
</div>

</div>

<script>

let playerHP = 100;
let enemyHP = 120;
let mana = 60;

let phase = 1;

/* UI */
function update(){
document.getElementById("php").innerText = playerHP;
document.getElementById("ehp").innerText = enemyHP;
document.getElementById("mana").innerText = mana;

/* BOSS PHASE SHIFT */
if(enemyHP < 60 && phase === 1){
phase = 2;
log("The Guardian awakens its true form...");
}
}

/* LOG */
function log(t){
document.getElementById("log").innerText = t;
}

/* DAMAGE EFFECT */
function damage(x, target){
const el = document.createElement("div");
el.className="damage";
el.innerText="-" + x;

document.body.appendChild(el);

const r = target.getBoundingClientRect();
el.style.left = r.left + "px";
el.style.top = r.top + "px";

setTimeout(()=>el.remove(),900);
}

/* HIT ANIMATION */
function hit(el){
el.classList.add("hit");
setTimeout(()=>el.classList.remove("hit"),300);
}

/* ATTACKS (THEMED) */

function attack(){
enemyHP -= 15;
hit(document.getElementById("enemy"));
damage(15, document.getElementById("enemy"));
log("You unleash a Serpent Strike!");
enemyTurn();
update();
}

function fire(){
if(mana < 10) return log("Not enough energy from the Otherworld");
mana -= 10;

enemyHP -= 22;
hit(document.getElementById("enemy"));
damage(22, document.getElementById("enemy"));

log("You cast Serpent Flame!");
enemyTurn();
update();
}

function lightning(){
if(mana < 15) return log("Star energy is weak");

mana -= 15;
enemyHP -= 28;

hit(document.getElementById("enemy"));
damage(28, document.getElementById("enemy"));

log("Star Sigil strikes the Guardian!");
enemyTurn();
update();
}

function heal(){
mana -= 10;
playerHP += 20;

log("The Otherworld restores your strength");
enemyTurn();
update();
}

/* ENEMY AI */
function enemyTurn(){

if(enemyHP <= 0){
log("The Guardian has fallen. The path opens...");
return;
}

let dmg = phase === 1 ? 12 : 20;

playerHP -= dmg;

hit(document.getElementById("player"));
log("The Guardian attacks from the Otherworld!");

update();

if(playerHP <= 0){
log("You were consumed by the Otherworld...");
}

}

update();

</script>

</body>
</html>
