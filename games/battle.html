<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Otherworld Saga</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0b0f1a;
color:white;
overflow:hidden;
}

/* STAGE */
.stage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* SPRITES */
.sprite{
width:130px;
height:130px;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
}

/* fallback if image missing */
.fallback{
background:#2b2f3a;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* POSITIONS */
.row{
display:flex;
gap:80px;
align-items:center;
}

/* UI */
.ui{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
max-width:500px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1f2937;
color:white;
}

button:hover{
background:#374151;
}

/* DIALOGUE BOX */
.dialogue{
position:absolute;
bottom:20px;
width:80%;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:10px;
text-align:center;
}

/* FADE */
.fade{
position:absolute;
inset:0;
background:black;
opacity:1;
animation:fadeOut 1.5s forwards;
}

@keyframes fadeOut{
to{opacity:0; pointer-events:none;}
}

</style>

</head>

<body>

<div class="stage">

<div class="row">

<div id="player" class="sprite fallback">KIRAN</div>
<div id="enemy" class="sprite fallback">GUARD</div>

</div>

<div class="ui">

<button onclick="attack()">Attack</button>
<button onclick="fire()">Serpent Flame</button>
<button onclick="heal()">Heal</button>

</div>

<div class="dialogue" id="dialogue">
A Guardian of the Otherworld stands before you...
</div>

<div class="fade"></div>

</div>

<script>

/* STORY SYSTEM */
let chapter = 1;

const bosses = [
{
name:"Serpent Gate Guardian",
hp:80,
dialogue:[
"Beyond this gate lies the Otherworld.",
"Turn back… or be judged."
]
},
{
name:"Nagini Court Warden",
hp:120,
dialogue:[
"The Court does not accept intruders.",
"Your power will be tested."
]
},
{
name:"Serpent Queen (Final Form)",
hp:180,
dialogue:[
"So you have reached me…",
"The Otherworld bows to none."
]
}
];

let boss = {...bosses[0]};

/* INIT */
function updateDialogue(text){
document.getElementById("dialogue").innerText = text;
}

/* COMBAT */
function attack(){
boss.hp -= 15;
updateDialogue("You strike " + boss.name);

next();
}

function fire(){
boss.hp -= 25;
updateDialogue("Serpent Flame burns the enemy");

next();
}

function heal(){
updateDialogue("You restore your strength");

next();
}

/* BOSS AI */
function enemyTurn(){

updateDialogue(boss.name + " attacks!");

}

/* PROGRESSION SYSTEM */
function next(){

if(boss.hp <= 0){
chapter++;

if(chapter > bosses.length){
updateDialogue("You have freed the Otherworld.");
return;
}

boss = {...bosses[chapter-1]};
updateDialogue("A new force appears: " + boss.name);
return;
}

enemyTurn();

}

</script>

</body>
</html>
