<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Otherworld Trial</title>

<style>

body{
margin:0;
font-family:system-ui;
background:black;
overflow:hidden;
color:white;
}

/* CINEMATIC LAYERS */
.scene{
position:relative;
height:100vh;
width:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* BACKGROUND FADE */
.bg{
position:absolute;
inset:0;
background:radial-gradient(circle,#1a1f2e,#05070f);
opacity:0;
animation:fadeIn 2s forwards;
z-index:0;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* CUTSCENE TEXT */
.cutscene{
position:absolute;
bottom:80px;
width:80%;
text-align:center;
font-size:18px;
opacity:0;
animation:textIn 3s forwards;
z-index:3;
}

@keyframes textIn{
0%{opacity:0; transform:translateY(10px);}
30%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;}
}

/* CHARACTERS */
.character{
width:120px;
height:120px;
position:absolute;
bottom:120px;
background-size:contain;
background-repeat:no-repeat;
background-position:center;
z-index:2;
}

/* PLAYER SPRITE */
.player{
left:20%;
background-image:url("https://i.imgur.com/3ZQ3Z4Q.png"); /* placeholder sprite */
animation:playerEnter 2s ease forwards;
}

/* ENEMY SPRITE */
.enemy{
right:20%;
background-image:url("https://i.imgur.com/9XqZ8xS.png"); /* placeholder serpent */
opacity:0;
animation:enemyEnter 2.5s ease forwards 1.5s;
}

@keyframes playerEnter{
from{transform:translateX(-200px);}
to{transform:translateX(0);}
}

@keyframes enemyEnter{
from{opacity:0; transform:translateX(200px);}
to{opacity:1; transform:translateX(0);}
}

/* UI */
.ui{
position:absolute;
bottom:20px;
z-index:4;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
cursor:pointer;
}

button:hover{
background:#374151;
}

/* FADE OVERLAY */
.fade{
position:absolute;
inset:0;
background:black;
z-index:5;
opacity:1;
animation:fadeOut 2s forwards;
}

@keyframes fadeOut{
to{opacity:0; pointer-events:none;}
}

</style>

</head>

<body>

<div class="scene">

<div class="bg"></div>

<!-- CUTSCENE -->
<div class="cutscene" id="cutscene">
A ripple opens in the Otherworld… a Guardian awakens.
</div>

<!-- CHARACTERS -->
<div class="character player"></div>
<div class="character enemy"></div>

<!-- UI -->
<div class="ui">
<button onclick="attack()">Strike</button>
<button onclick="spell()">Serpent Flame</button>
<button onclick="heal()">Blessing</button>
</div>

<div class="fade"></div>

</div>

<script>

let phase = 0;
let hp = 100;
let enemy = 120;

setTimeout(()=>{
phase = 1;
},3000);

/* CUTSCENE TEXT SYSTEM */
function showText(text){
const c = document.getElementById("cutscene");
c.innerText = text;
c.style.animation="none";
void c.offsetWidth;
c.style.animation="textIn 3s forwards";
}

/* ATTACKS */

function attack(){
enemy -= 15;
showText("You strike the Guardian of the Otherworld");

enemyTurn();
}

function spell(){
enemy -= 25;
showText("Serpent Flame burns through the realm");

enemyTurn();
}

function heal(){
hp += 20;
showText("The Otherworld restores your strength");

enemyTurn();
}

/* ENEMY AI */
function enemyTurn(){

if(enemy <= 0){
showText("The Guardian collapses… the path opens.");
return;
}

let dmg = phase ? 18 : 10;

hp -= dmg;

showText("The Guardian strikes back!");

if(hp <= 0){
showText("You were lost in the Otherworld...");
}

}

</script>

</body>
</html>
