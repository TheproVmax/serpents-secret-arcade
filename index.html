<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Serpent's Secret Arcade</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PARTICLES BACKGROUND -->
<canvas id="particles"></canvas>

<!-- MAIN UI -->
<div class="hero">

<div class="glow"></div>

<h1>Serpent's Secret Arcade</h1>

<p>
A hidden realm inspired by The Serpent’s Secret.
Enter the Otherworld and complete the trials.
</p>

<div class="buttons">
<button onclick="startGame()">Start Adventure</button>
<button onclick="continueGame()">Continue</button>
</div>

</div>

<script src="engine.js"></script>

<script>
function startGame(){
localStorage.setItem("save", JSON.stringify({
hp:100,
level:1,
area:"map"
}));

window.location.href="world/map.html";
}

function continueGame(){
if(!localStorage.getItem("save")){
alert("No save found");
return;
}

window.location.href="world/map.html";
}
</script>

</body>
</html>
