<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Serpent's Secret – Game Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <section id="home" class="screen active">
    <div class="home-content">
      <h1 class="title">The Serpent's Secret</h1>
      <p class="subtitle">An adventure beyond the ordinary</p>
      <button class="primary-btn" onclick="openGames()">Start Adventure</button>
    </div>
  </section>

  <!-- GAME SELECT SCREEN -->
  <section id="games" class="screen">
    <header class="top-bar">
      <button class="back-btn" onclick="goHome()">Back</button>
      <h2>Choose Your Journey</h2>
    </header>

    <div class="game-grid">
      <button class="game-card">Stacking Challenge</button>
      <button class="game-card">Mini Platformer</button>
      <button class="game-card">Draw & Guess</button>
      <button class="game-card">Monster Battles</button>
    </div>
  </section>

 <script src="./engine.js"></script>
</body>
</html>
