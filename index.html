<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Serpent's Secret Arcade</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="particles"></canvas>

<!-- TITLE SCREEN -->
<div class="title-screen" id="titleScreen">

<h1>Serpent’s Secret Arcade</h1>

<p>Press any key to begin</p>

</div>

<!-- MENU (hidden until key press) -->
<div class="menu hidden" id="menu">

<h1>Serpent’s Secret Arcade</h1>

<div class="buttons">

<button onclick="startGame()">New Game</button>
<button onclick="continueGame()">Continue</button>

</div>

</div>

<script src="engine.js"></script>

<script>

let started = false;

document.addEventListener("keydown", start);
document.addEventListener("click", start);

function start(){
if(started) return;
started = true;

document.getElementById("titleScreen").classList.add("fadeOut");

setTimeout(()=>{
document.getElementById("titleScreen").style.display="none";
document.getElementById("menu").classList.remove("hidden");
document.getElementById("menu").classList.add("fadeIn");
},600);
}

function startGame(){
localStorage.setItem("save", JSON.stringify({
hp:100,
level:1,
area:"map"
}));

window.location.href="world/map.html";
}

function continueGame(){
if(!localStorage.getItem("save")){
alert("No save found");
return;
}

window.location.href="world/map.html";
}

</script>

</body>
</html>
