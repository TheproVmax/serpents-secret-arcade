<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Serpent's Secret RPG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Game-like font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Fog Background -->
<div id="fog"></div>

<!-- Title Screen -->
<div id="title-screen">
  <img id="hero" src="assets/kiran.png" alt="Hero">

  <h1>The Serpent's Secret</h1>
  <button id="startBtn">Start Game</button>
</div>

<!-- Game Screen -->
<div id="game-screen" class="hidden">

  <!-- HUD -->
  <div id="hud">
    <div class="health-container">
      <span class="health-label">HP</span>
      <div class="health-bar-bg">
        <div id="player-health-bar"></div>
      </div>
      <span id="health-text">100 / 100</span>
    </div>
  </div>

  <!-- Battle Area -->
  <div id="battle-area">
    <p id="battle-text">A wild enemy appears!</p>

    <div class="battle-buttons">
      <button onclick="takeDamage(15)">Attack</button>
      <button onclick="heal(10)">Heal</button>
    </div>
  </div>

</div>

<script src="engine.js"></script>
</body>
</html>
