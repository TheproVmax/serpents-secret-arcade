<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Serpent’s Secret</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <section id="home" class="screen active">
    <div class="home-inner">
      <h1 class="title">The Serpent’s Secret</h1>
      <p class="subtitle">A Mythic Adventure Awaits</p>
      <button class="primary-btn" onclick="goToGames()">Start Adventure</button>
    </div>
  </section>

  <!-- GAME SELECT -->
  <section id="games" class="screen">
    <h2 class="section-title">Choose Your Path</h2>

    <div class="game-grid">
      <button class="game-card">Realm of Serpents</button>
      <button class="game-card">Sky Kingdom</button>
      <button class="game-card">Underworld Trials</button>
      <button class="game-card">Final Battle</button>
    </div>

    <button class="back-btn" onclick="goHome()">Back</button>
  </section>

<script src="script.js"></script>
</body>
</html>
